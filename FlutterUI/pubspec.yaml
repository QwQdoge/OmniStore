name: frontend
description: "A new Flutter project."
publish_to: 'none'

# =========================================================
# ⚠️ WARNING TO AI / DEVELOPER:
# 1. All dependencies have been upgraded to their MAJOR versions.
#    DO NOT downgrade any package version under any circumstances.
# 2. 'flutter_markdown' is DISCONTINUED. We are strictly using 
#    'flutter_markdown_plus'. DO NOT change it back to the old package.
# =========================================================

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State & Storage
  provider: ^6.1.2
  shared_preferences: ^2.5.5 # 适配最新生态，防止 AI 拿旧版本死锁
  
  # UI & Media
  flutter_markdown_plus: ^1.0.1 # 替代已废弃的 flutter_markdown，提供更丰富的 Markdown 支持
  cached_network_image: ^3.3.1
  cupertino_icons: ^1.0.8
  
  # Desktop & OS Integration (Crucial for Arch Linux/Wayland compatibility)
  window_manager: ^0.5.1
  system_tray: ^2.0.3 # 修复老版本在部分 Linux 环境下托盘图标退出的 Bug
  flutter_local_notifications: ^22.0.0
  file_picker: ^12.0.0-beta.5
  
  # Network & Core Utilities
  web_socket_channel: ^3.0.3
  url_launcher: ^6.3.2
  http: ^1.6.0
  intl: any
  path: any
  supabase_flutter: ^2.14.1
  app_links: any
  flutter_secure_storage: ^10.3.1
  path_provider: ^2.1.5
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/app_icon.png