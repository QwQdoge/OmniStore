# ==============================================================================
# OmniStore Global Configuration Template 
# This YAML file defines all configurable settings for OmniStore, including search parameters, source priorities, UI preferences, logging, notifications, update management, AI assistant integration, GitHub connectivity, and more.
# ⚠️ WARNING TO AI / DEVELOPER:
# 1. This file is the single source of truth for all user-configurable settings. DO NOT hardcode any of these values in the application codebase. Always read from this config.
# 2. When adding new settings, ensure they are properly namespaced and documented. Follow the existing structure for consistency.
# 3. Do NOT include any sensitive information (like API keys) in this file. Use environment variables or secure vaults for secrets management.
# ==============================================================================

# --- Search Settings ---
search:
  sources:
    pacman: false       # Search native repositories
    aur: false          # Search AUR user repository
    flatpak: false      # Search Flatpak applications
    appimage: false     # Search AppImages from AppImage GitHub feed
    apt: false          # Debian/Ubuntu APT source (review before enabling)
    dnf: false          # Fedora/RHEL DNF source (review before enabling)
    zypper: false       # openSUSE Zypper source (review before enabling)
    apk: false          # Alpine APK source (review before enabling)
    winget: false       # Windows Winget source (review before enabling)
    scoop: false        # Windows Scoop source (review before enabling)
    chocolatey: false   # Windows Chocolatey source (review before enabling)
    brew: false         # macOS/Linux Homebrew source (review before enabling)
    fdroid: false       # Android/F-Droid source via fdroidcl (review before enabling)
  max_results: 100     # Maximum search results returned by backend
  debounce_ms: 300     # Input debounce delay in milliseconds

# --- Source Priorities (Smart Scoring Weight) ---
priority:
  pacman: 100          # Highest priority: local system pacman repositories
  aur: 80              # AUR packages
  flatpak: 60          # Sandbox container apps
  appimage: 40         # Pre-compiled stand-alone binaries

# --- Plugin Registry ---
plugins:
  enabled: {}          # Plugins are disabled by default; users review available plugins, then enable trusted ids explicitly.
  config: {}           # Plugin-specific config keyed by plugin id

sources:
  order: ["github", "bitu", "pacman", "aur", "flatpak", "appimage", "apt", "dnf", "zypper", "apk", "winget", "scoop", "chocolatey", "brew", "fdroid"]
  priority:
    pacman: 100
    aur: 80
    apt: 85
    dnf: 85
    zypper: 85
    apk: 75
    winget: 90
    scoop: 70
    chocolatey: 70
    brew: 70
    flatpak: 60
    fdroid: 55
    appimage: 40
    github: 30
    bitu: 30

# --- User Interface (M3 Standards) ---
ui:
  appearance: "system" # Theme mode: "system", "dark", or "light"
  color_seed: "#0B57D0" # Primary color seed hex (classic MD3 blue)
  language: "zh-CN"    # UI language: "zh-CN", "zh-TW", "en-US", or "ja-JP"
  close_to_tray: true  # Hide to tray when closing window
  use_system_title_bar: false # Disable custom header in favor of standard window buttons

# --- Logger settings ---
logging:
  level: "INFO"        # Log level: "DEBUG", "INFO", "WARNING", "ERROR"

# --- User Notifications ---
notifications:
  enabled: true        # Enable system notifications
  progress: true       # Show installation/uninstallation progress bubbles
  completion: true     # Notify on package completion (success/failure)

# --- Software Updates ---
updates:
  check_interval_hours: 1
  remind_updates: true
  include_aur_in_update_all: true

# --- AI Assistant Settings (Ollama / OpenAI Compatible) ---
ai:
  enabled: false
  provider: "ollama"   # "ollama" for local LLM or "openai" for OpenAI API compatible (DeepSeek, etc.)
  endpoint: "http://localhost:11434" # Ollama default API URL or Custom LLM Gateway
  model: "qwen2.5:7b"  # Model tag to run (e.g. qwen2.5:7b, deepseek-chat, llama3)
  api_key: ""          # Required for OpenAI/DeepSeek endpoints, leave empty for Ollama
  temperature: 0.7     # AI generation temperature

# --- GitHub Integration ---
github:
  pat: ""              # GitHub Personal Access Token

# --- Initial Setup ---
first_run: true        # Whether this is the first time the app is run

# --- Custom Repositories ---
custom_repos:
  flatpak: []          # List of maps: e.g. [{"name": "flathub-beta", "url": "https://dl.flathub.org/beta-repo/flathub-beta.flatpakrepo"}]
  pacman: []           # List of maps: e.g. [{"name": "archlinuxcn", "url": "https://mirrors.ustc.edu.cn/archlinuxcn/$arch"}]
  appimage: []         # List of strings: URLs to custom feed.json or local folders
  apt: []              # Debian/Ubuntu repositories tracked for UI display
  dnf: []              # Fedora/RHEL repositories tracked for UI display
  zypper: []           # openSUSE repositories tracked for UI display
  apk: []              # Alpine repositories tracked for UI display
  chocolatey: []       # Chocolatey sources tracked for UI display
  fdroid: []           # F-Droid repositories tracked for UI display

# --- Mirrors Editing (Local Configuration Targets) ---
mirrors:
  pacman: "/etc/pacman.d/mirrorlist"
  flatpak_remotes:
    - "https://dl.flathub.org/repo/flathub.flatpakrepo"

# --- Background Daemon (Rust Checker) ---
daemon:
  enabled: true        # Start the Rust updater service in background
  check_interval_hours: 4 # Check interval
  auto_update: false   # Enable automatic software updates (runs in background)
  notifications: true  # Let background service trigger desktop alerts
